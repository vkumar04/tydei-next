[build]
buildCommand = "bun install && bunx prisma generate && bun run build"

[deploy]
startCommand = "bun run start"
healthcheckPath = "/"
# 2026-04-26: switched from `prisma db push --accept-data-loss` to a
# proper migrate-deploy flow. db push silently destroys data on schema
# drift; migrate deploy refuses to apply destructive changes outside
# of an explicit migration file. The script bootstraps the migrations
# table on first run (marks 0_init baseline as applied) then runs
# `prisma migrate deploy`. See scripts/prisma-deploy.sh + the
# 0_init baseline at prisma/migrations/0_init/migration.sql.
preDeployCommand = "bash scripts/prisma-deploy.sh"
